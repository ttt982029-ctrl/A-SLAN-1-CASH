<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASLAN-X | THE ULTIMATE ECOSYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Orbitron:wght@400;900&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; perspective: 1000px; }
        .luxury-gold { background: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 3D Coin & Animation */
        .coin-wrapper { transform-style: preserve-3d; transition: transform 0.1s; }
        .aslan-coin {
            width: 250px; height: 250px;
            background: radial-gradient(circle at 30% 30%, #f3ba2f, #8c6a15);
            border-radius: 50%;
            border: 6px solid #b8860b;
            box-shadow: 0 0 80px rgba(184, 134, 11, 0.4), inset 0 0 30px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .aslan-coin:active { transform: scale(0.92) rotateX(15deg); }

        /* PUBG Transitions */
        #blackout { position: fixed; inset: 0; background: black; z-index: 10000; display: none; }
        
        /* Glass UI */
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 215, 0, 0.1); border-radius: 20px; }
        
        .screen { display: none; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }
        
        .tap-pop { position: absolute; color: #f3ba2f; font-weight: 900; font-size: 30px; pointer-events: none; animation: flyUp 0.7s ease-out forwards; text-shadow: 0 0 10px #000; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <audio id="audio-player" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg">
    </audio>

    <div id="blackout"></div>

    <div id="login-screen" class="fixed inset-0 z-[5000] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="luxury-gold text-5xl font-black tracking-tighter mb-2 font-[Orbitron]">ASLAN-X</h1>
        <p class="text-[9px] tracking-[0.6em] text-yellow-800 mb-12 font-bold uppercase">Authorized Access Only</p>
        
        <div class="w-full max-w-xs space-y-4">
            <input type="text" id="user-id" placeholder="ADMIN ID" class="w-full bg-neutral-900/50 border border-yellow-900/30 p-4 rounded-xl outline-none focus:border-yellow-600">
            <input type="password" id="user-pass" placeholder="SECRET KEY" class="w-full bg-neutral-900/50 border border-yellow-900/30 p-4 rounded-xl outline-none focus:border-yellow-600">
            <button onclick="loginProcess()" class="w-full bg-gradient-to-r from-yellow-700 to-yellow-500 text-black font-black py-4 rounded-xl shadow-xl active:scale-95 transition-all">
                INITIALIZE ECOSYSTEM
            </button>
        </div>
    </div>

    <div id="app-interface" class="hidden flex-grow flex flex-col h-full">
        
        <div class="p-6 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-yellow-600 rounded-full flex items-center justify-center"><i class="fas fa-crown text-black text-xs"></i></div>
                <div>
                    <p class="text-[8px] text-yellow-600 font-bold uppercase tracking-widest">Administrator</p>
                    <p class="text-xs font-black">RANK #1</p>
                </div>
            </div>
            <button><i class="fas fa-ellipsis-v text-gray-500"></i></button>
        </div>

        <div class="text-center">
            <p class="text-gray-500 text-[10px] font-bold tracking-[0.3em] uppercase mb-1">Total Staked Assets</p>
            <h1 id="main-balance" class="text-6xl font-black italic tracking-tighter">0</h1>
            <p class="text-green-500 text-[9px] font-bold mt-2 animate-pulse uppercase tracking-widest">
                <i class="fas fa-microchip"></i> Auto-Mining: 150 ASLN/H
            </p>
        </div>

        <div class="flex-grow overflow-y-auto px-6 py-4">
            
            <div id="screen-tap" class="screen active flex items-center justify-center">
                <div class="coin-wrapper" id="tap-target">
                    <div class="aslan-coin">
                        <img src="https://img.icons8.com/color/250/000000/triangle.png" class="absolute w-44 z-10 pointer-events-none drop-shadow-lg">
                        
                        <img src="https://img.icons8.com/color/180/000000/lion.png" class="absolute opacity-5 w-48 pointer-events-none">
                    </div>
                </div>
            </div>

            <div id="screen-rank" class="screen flex-col gap-3">
                <h2 class="text-center text-yellow-600 font-bold mb-4 font-[Orbitron]">LEADERBOARD</h2>
                <div class="glass-panel p-4 flex justify-between border-yellow-600/50">
                    <span class="font-bold text-yellow-500">#1 YOU (Admin)</span>
                    <span class="font-mono" id="rank-1-bal">1,000,000</span>
                </div>
                <div class="glass-panel p-4 flex justify-between opacity-40">
                    <span>#2 Satoshi_X</span>
                    <span class="font-mono">890,420</span>
                </div>
            </div>

            <div id="screen-wallet" class="screen flex-col">
                <div class="glass-panel p-6 space-y-4">
                    <h3 class="text-yellow-500 font-bold uppercase text-xs tracking-widest">P2P Transfer</h3>
                    <input type="text" id="friend-id" placeholder="RECIPIENT CODE" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none text-sm">
                    <input type="number" id="send-qty" placeholder="AMOUNT" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none text-sm">
                    <button onclick="sendCoins()" class="w-full bg-yellow-600 text-black font-bold py-4 rounded-xl">SEND NOW</button>
                </div>
            </div>

        </div>

        <div class="px-6 mb-4">
            <div class="glass-panel p-4">
                <div class="flex justify-between text-[10px] font-bold mb-2">
                    <span class="text-yellow-600">ENERGY ⚡</span>
                    <span id="energy-text">1000/1000</span>
                </div>
                <div class="w-full bg-black/50 h-1.5 rounded-full">
                    <div id="energy-bar" class="bg-yellow-500 h-full w-full transition-all"></div>
                </div>
            </div>
        </div>

        <div class="flex justify-around items-center bg-[#050505] border-t border-white/5 pb-10 pt-4">
            <button onclick="changeScreen('tap')" class="flex flex-col items-center gap-1 text-yellow-500"><i class="fas fa-coins"></i><span class="text-[8px] font-bold uppercase">Exchange</span></button>
            <button onclick="changeScreen('rank')" class="flex flex-col items-center gap-1 text-gray-500"><i class="fas fa-trophy"></i><span class="text-[8px] font-bold uppercase">Rank</span></button>
            <button onclick="changeScreen('wallet')" class="flex flex-col items-center gap-1 text-gray-500"><i class="fas fa-wallet"></i><span class="text-[8px] font-bold uppercase">Wallet</span></button>
        </div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('aslan_ultra_bal')) || 0;
        let energy = 1000;
        let isFirstTime = localStorage.getItem('aslan_first_boot') === null;

        function loginProcess() {
            if(!document.getElementById('user-id').value) return alert("Enter Admin ID");
            
            // Start Luxury Music
            const music = document.getElementById('audio-player');
            music.volume = 0.2;
            music.play();

            const blackout = document.getElementById('blackout');
            blackout.style.display = 'block';

            setTimeout(() => {
                // Admin 1 Million Bonus
                if(isFirstTime) {
                    balance = 1000000;
                    localStorage.setItem('aslan_first_boot', 'no');
                }
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-interface').classList.remove('hidden');
                updateUI();

                setTimeout(() => {
                    blackout.style.opacity = '0';
                    setTimeout(() => blackout.style.display = 'none', 600);
                }, 400);
            }, 800);
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = balance.toLocaleString();
            document.getElementById('rank-1-bal').innerText = balance.toLocaleString();
            document.getElementById('energy-text').innerText = `${energy}/1000`;
            document.getElementById('energy-bar').style.width = (energy / 10) + '%';
            localStorage.setItem('aslan_ultra_bal', balance);
        }

        // Tap Mechanics
        document.getElementById('tap-target').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(energy >= 5) {
                balance += 250;
                energy -= 5;
                
                const touch = e.touches[0];
                const pop = document.createElement('div');
                pop.className = 'tap-pop';
                pop.innerText = '+250';
                pop.style.left = touch.clientX + 'px';
                pop.style.top = touch.clientY + 'px';
                document.body.appendChild(pop);
                setTimeout(() => pop.remove(), 700);
                
                updateUI();
            }
        });

        // Navigation
        function changeScreen(name) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + name).classList.add('active');
            
            // Icon color change
            document.querySelectorAll('nav button, .flex button').forEach(b => {
                if(b.onclick && b.onclick.toString().includes(name)) b.classList.add('text-yellow-500');
                else b.classList.replace('text-yellow-500', 'text-gray-500');
            });
        }

        // Auto-Mining & Energy Recovery
        setInterval(() => {
            if(!document.getElementById('app-interface').classList.contains('hidden')) {
                balance += 1; // Passive mining
                if(energy < 1000) energy = Math.min(1000, energy + 5);
                updateUI();
            }
        }, 1500);

        function sendCoins() {
            const amt = parseInt(document.getElementById('send-qty').value);
            const id = document.getElementById('friend-id').value;
            if(!id || amt > balance || amt <= 0) return alert("Transfer Blocked: Invalid Details");
            balance -= amt;
            updateUI();
            alert(`Encrypted: ${amt} ASLN sent to ${id}`);
        }

        updateUI();
    </script>
</body>
</html>
