<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A-SLAN CASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%); overflow: hidden; touch-action: manipulation; -webkit-user-select: none; }
        .coin-glow { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5)); transition: transform 0.05s; }
        .coin-glow:active { transform: scale(0.92); }
        .tap-anim { position: absolute; color: #ffd700; font-weight: bold; font-size: 28px; pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 50; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #94a3b8; }
        .active-nav { color: #ffd700; }
    </style>
</head>
<body class="text-white font-sans flex flex-col items-center justify-between h-screen p-6">

    <div class="mt-4 text-center">
        <p class="text-gray-400 uppercase text-xs tracking-widest">A-SLAN BALANCE</p>
        <div class="flex items-center justify-center gap-2 mt-1">
            <img src="https://img.icons8.com/color/48/gold-bars.png" width="35">
            <h1 id="score" class="text-5xl font-black text-yellow-500 tracking-tighter">0</h1>
        </div>
    </div>

    <div class="relative flex items-center justify-center w-full grow" onclick="handleTap(event)">
        <div class="coin-glow bg-gradient-to-b from-yellow-300 to-yellow-600 w-64 h-64 rounded-full border-[10px] border-yellow-700 flex items-center justify-center shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <div class="bg-yellow-500 w-52 h-52 rounded-full border-4 border-yellow-800 flex items-center justify-center shadow-inner">
                <span class="text-8xl font-black text-yellow-900 drop-shadow-md">A</span>
            </div>
        </div>
    </div>

    <div class="w-full max-w-sm bg-gray-900/80 border border-gray-800 rounded-[32px] p-5 mb-2">
        <div class="flex justify-between items-center mb-3">
            <div class="flex items-center gap-2">
                <span>⚡</span>
                <span id="energy-text" class="font-bold text-sm">500 / 500</span>
            </div>
            <span class="text-xs text-yellow-500">Level 1</span>
        </div>
        
        <div class="w-full bg-gray-800 rounded-full h-3 mb-6">
            <div id="energy-bar" class="bg-gradient-to-r from-yellow-400 to-orange-500 h-3 rounded-full transition-all duration-300" style="width: 100%"></div>
        </div>

        <div class="flex justify-around pt-2 border-t border-gray-800">
            <div class="nav-btn active-nav"><span>🏠</span><span>Home</span></div>
            <div class="nav-btn" onclick="alert('Mining feature coming soon!')"><span>⛏️</span><span>Mine</span></div>
            <div class="nav-btn" onclick="alert('Invite Friends!')"><span>👥</span><span>Friends</span></div>
            <div class="nav-btn" onclick="alert('Earn more coins!')"><span>💰</span><span>Earn</span></div>
        </div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('aslan_score')) || 0;
        let energy = parseInt(localStorage.getItem('aslan_energy')) || 500;
        const maxEnergy = 500;

        // Initial UI Update
        updateUI();

        function handleTap(event) {
            if (energy > 0) {
                score += 1;
                energy -= 1;
                
                // Visual feedback
                showTapAnimation(event.clientX, event.clientY);
                updateUI();
                
                // Save data
                localStorage.setItem('aslan_score', score);
                localStorage.setItem('aslan_energy', energy);
            }
        }

        function updateUI() {
            document.getElementById('score').innerText = score.toLocaleString();
            document.getElementById('energy-text').innerText = `${energy} / ${maxEnergy}`;
            document.getElementById('energy-bar').style.width = (energy / maxEnergy * 100) + '%';
        }

        function showTapAnimation(x, y) {
            const anim = document.createElement('div');
            anim.className = 'tap-anim';
            anim.innerText = '+1';
            anim.style.left = (x - 10) + 'px';
            anim.style.top = (y - 40) + 'px';
            document.body.appendChild(anim);
            setTimeout(() => anim.remove(), 600);
        }

        // Energy Recovery (1 point every 1.5 seconds)
        setInterval(() => {
            if (energy < maxEnergy) {
                energy += 1;
                updateUI();
                localStorage.setItem('aslan_energy', energy);
            }
        }, 1500);
    </script>
</body>
</html>
