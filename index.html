<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A-SLAN | Neon Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #f59e0b; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* The Master Hexagon Coin */
        .master-coin {
            width: 260px; height: 260px;
            background: linear-gradient(135deg, #f59e0b, #78350f);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            position: relative; transition: all 0.1s;
            box-shadow: 0 0 50px rgba(245, 158, 11, 0.4);
        }
        .master-coin:active { transform: scale(0.92) rotate(5deg); }
        .inner-hex {
            position: absolute; inset: 6px; background: #000;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex; items-center; justify-content: center;
        }

        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(245, 158, 11, 0.1); border-radius: 40px; }
        .neon-text { text-shadow: 0 0 10px rgba(245, 158, 11, 0.8); }
        .nav-btn { transition: all 0.3s; opacity: 0.4; }
        .nav-btn.active { opacity: 1; color: var(--neon); transform: translateY(-5px); }
        
        /* Floating Dots Menu */
        .dots-btn { width: 40px; height: 40px; display: flex; flex-direction: column; justify-content: center; gap: 4px; align-items: center; }
        .dot { width: 4px; height: 4px; background: var(--neon); border-radius: 50%; box-shadow: 0 0 5px var(--neon); }
        
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }
        .pulse { animation: pulse-gold 2s infinite; }
    </style>
</head>
<body>

    <div id="authScreen" class="fixed inset-0 z-[500] bg-black flex flex-col items-center justify-center p-8 transition-all duration-700">
        <div class="mb-12 text-center">
            <h1 class="text-6xl font-black italic tracking-tighter neon-text text-amber-500">A-SLAN</h1>
            <p class="text-[10px] tracking-[0.6em] text-gray-500 font-bold">NEON GENESIS PROTOCOL</p>
        </div>
        <div class="glass-panel p-8 w-full max-w-sm space-y-4">
            <input type="text" id="authName" placeholder="IDENTITY" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 outline-none focus:border-amber-500 text-center uppercase tracking-widest">
            <input type="password" id="authPass" placeholder="PASSCODE" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 outline-none focus:border-amber-500 text-center tracking-widest">
            <button onclick="handleAuth()" class="w-full bg-amber-500 text-black font-black p-5 rounded-3xl shadow-xl hover:bg-amber-400 transition-all">INITIALIZE</button>
        </div>
    </div>

    <div id="mainApp" class="hidden h-screen flex flex-col">
        
        <header class="p-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 glass-panel flex items-center justify-center border-amber-500/30">
                    <i class="fa-solid fa-bolt-lightning text-amber-500 text-xl shadow-lg"></i>
                </div>
                <div>
                    <h2 id="topName" class="text-sm font-black italic tracking-wider">---</h2>
                    <div id="rankLabel" class="text-[8px] bg-amber-500/10 text-amber-500 px-2 py-0.5 rounded-full inline-block font-bold">SCANNING...</div>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <span class="text-[8px] text-gray-500 block font-bold">TOTAL ASSETS</span>
                    <span id="balance" class="text-2xl font-black neon-text text-amber-500 tracking-tighter">0</span>
                </div>
                <button onclick="toggleMenu()" class="dots-btn glass-panel">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </button>
            </div>
        </header>

        <div id="dropMenu" class="hidden absolute top-24 right-6 z-[200] glass-panel w-48 overflow-hidden">
            <button onclick="logout()" class="w-full p-4 text-left text-xs font-black text-red-500 hover:bg-red-500/10"><i class="fa-solid fa-power-off mr-3"></i>TERMINATE</button>
        </div>

        <main class="flex-1 px-6 flex flex-col items-center justify-center">
            
            <div id="minePage" class="page active-page w-full flex flex-col items-center">
                <div class="mb-10 text-center">
                    <div class="text-[10px] text-amber-500 font-black tracking-widest uppercase mb-2">Mining Velocity</div>
                    <div id="rateValue" class="text-xs italic text-gray-400">0.00 ASL / CLICK</div>
                </div>

                <button onclick="tap()" class="master-coin pulse">
                    <div class="inner-hex">
                        <span class="text-8xl filter drop-shadow-[0_0_15px_rgba(245,158,11,0.5)]">🦁</span>
                    </div>
                </button>

                <div class="w-full mt-16 max-w-sm glass-panel p-6 border-amber-500/5">
                    <div class="flex justify-between items-end mb-4 font-black">
                        <span class="text-[9px] text-gray-500 tracking-[0.2em]">ENERGY CORE</span>
                        <span id="energyText" class="text-xs text-amber-500">1000/1000</span>
                    </div>
                    <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                        <div id="energyBar" class="h-full bg-gradient-to-r from-amber-700 to-amber-400 rounded-full transition-all duration-300"></div>
                    </div>
                </div>
            </div>

            <div id="rankPage" class="page w-full space-y-4">
                <h3 class="text-center text-amber-500 font-black italic tracking-widest mb-8 uppercase">Genesis Council</h3>
                <div id="rankList" class="space-y-3"></div>
            </div>
        </main>

        <button onclick="openPortal('send')" class="fixed right-6 bottom-32 w-14 h-14 bg-amber-500 rounded-2xl flex items-center justify-center shadow-lg shadow-amber-500/20 active:scale-90 border-t-2 border-white/30">
            <i class="fa-solid fa-arrows-up-down-left-right text-black text-xl"></i>
        </button>

        <nav class="h-24 glass-panel m-4 mt-0 border-t-0 rounded-t-none flex justify-around items-center">
            <button onclick="showPage('minePage', this)" class="nav-btn active flex flex-col items-center gap-1">
                <i class="fa-solid fa-cube text-xl"></i><span class="text-[8px] font-black uppercase">Core</span>
            </button>
            <button onclick="showPage('rankPage', this)" class="nav-btn flex flex-col items-center gap-1">
                <i class="fa-solid fa-crown text-xl"></i><span class="text-[8px] font-black uppercase">Council</span>
            </button>
            <button onclick="openPortal('receive')" class="nav-btn flex flex-col items-center gap-1">
                <i class="fa-solid fa-satellite-dish text-xl"></i><span class="text-[8px] font-black uppercase">Sync</span>
            </button>
        </nav>
    </div>

    <div id="portalModal" class="hidden fixed inset-0 z-[600] bg-black/95 backdrop-blur-xl flex items-center justify-center p-8">
        <div class="glass-panel p-10 w-full max-w-sm border-amber-500/40 text-center">
            <h2 id="portalTitle" class="text-2xl font-black italic text-amber-500 mb-8 tracking-widest uppercase">SEND ASSET</h2>
            <div id="portalInputGroup" class="space-y-6">
                <div id="sendGroup">
                    <input type="number" id="pAmt" placeholder="AMOUNT" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-center font-bold mb-4 outline-none focus:border-amber-500">
                    <input type="text" id="pKey" maxlength="3" placeholder="SECRET KEY (3 CHARS)" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-center font-black tracking-[1em] outline-none focus:border-amber-500 uppercase">
                    <button onclick="executeSend()" class="w-full bg-amber-500 text-black font-black p-5 mt-6 rounded-2xl shadow-lg">LOCK TRANSFER</button>
                </div>
                <div id="receiveGroup" class="hidden">
                    <input type="text" id="rKey" maxlength="3" placeholder="INPUT SECRET KEY" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-center font-black tracking-[1em] outline-none focus:border-amber-500 uppercase">
                    <button onclick="executeReceive()" class="w-full bg-white text-black font-black p-5 mt-6 rounded-2xl shadow-lg">SYNC ASSETS</button>
                </div>
            </div>
            <button onclick="closePortal()" class="mt-8 text-[9px] text-gray-500 font-black tracking-widest uppercase">Abort Sync</button>
        </div>
    </div>

    <script>
        let user = { name: "", pass: "", bal: 0, energy: 1000, pos: 0 };
        const REG_KEY = 'aslan_genesis_count';
        const TRX_KEY = 'aslan_genesis_trx';

        window.onload = () => {
            const saved = localStorage.getItem('aslan_user_master');
            if(saved) { user = JSON.parse(saved); enterApp(); }
        }

        function toggleMenu() { document.getElementById('dropMenu').classList.toggle('hidden'); }

        function handleAuth() {
            const n = document.getElementById('authName').value.toUpperCase();
            const p = document.getElementById('authPass').value;
            if(!n || !p) return;

            if(n === "DR. HELP" && p === "143143") {
                user = JSON.parse(localStorage.getItem('aslan_user_master')) || { name: n, pass: p, bal: 10000000, energy: 1000, pos: 1 };
            } else {
                let count = parseInt(localStorage.getItem(REG_KEY)) || 1;
                count++; localStorage.setItem(REG_KEY, count);
                let bonus = (count <= 3) ? 100000 : 0;
                user = { name: n, pass: p, bal: bonus, energy: 1000, pos: count };
            }
            saveData(); enterApp();
        }

        function tap() {
            if(user.energy <= 0) return;
            let pwr = (user.pos === 1) ? 500 : (user.pos <= 3 ? 100 : 5);
            user.bal += pwr; user.energy -= 1;
            updateUI(); saveData();
        }

        function updateUI() {
            document.getElementById('topName').innerText = user.name;
            document.getElementById('balance').innerText = Math.floor(user.bal).toLocaleString();
            document.getElementById('energyBar').style.width = (user.energy/10) + "%";
            document.getElementById('energyText').innerText = user.energy + "/1000";
            let r = "CITIZEN";
            if(user.pos === 1) r = "SUPREME FOUNDER";
            else if(user.pos === 2) r = "EXECUTIVE DELEGATE";
            else if(user.pos === 3) r = "PREMIUM MEMBER";
            document.getElementById('rankLabel').innerText = r;
            document.getElementById('rateValue').innerText = (user.pos === 1 ? 500 : (user.pos <= 3 ? 100 : 5)) + ".00 ASL / CLICK";
        }

        function openPortal(mode) {
            document.getElementById('portalModal').classList.remove('hidden');
            if(mode === 'send') {
                document.getElementById('portalTitle').innerText = "SEND ASSET";
                document.getElementById('sendGroup').classList.remove('hidden');
                document.getElementById('receiveGroup').classList.add('hidden');
            } else {
                document.getElementById('portalTitle').innerText = "SYNC ASSET";
                document.getElementById('sendGroup').classList.add('hidden');
                document.getElementById('receiveGroup').classList.remove('hidden');
            }
        }
        function closePortal() { document.getElementById('portalModal').classList.add('hidden'); }

        function executeSend() {
            let amt = parseInt(document.getElementById('pAmt').value);
            let key = document.getElementById('pKey').value.toUpperCase();
            if(amt > user.bal || key.length !== 3) return alert("System Error: Check Amount/Key");
            
            let trx = JSON.parse(localStorage.getItem(TRX_KEY) || "[]");
            trx.push({ key, amt });
            localStorage.setItem(TRX_KEY, JSON.stringify(trx));
            
            user.bal -= amt; saveData(); updateUI();
            alert("ASSET LOCKED. SHARE KEY: " + key); closePortal();
        }

        function executeReceive() {
            let key = document.getElementById('rKey').value.toUpperCase();
            let trx = JSON.parse(localStorage.getItem(TRX_KEY) || "[]");
            let idx = trx.findIndex(t => t.key === key);
            if(idx !== -1) {
                user.bal += trx[idx].amt;
                trx.splice(idx, 1);
                localStorage.setItem(TRX_KEY, JSON.stringify(trx));
                saveData(); updateUI(); alert("SYNC SUCCESSFUL!"); closePortal();
            } else alert("Invalid Master Key");
        }

        function enterApp() { document.getElementById('authScreen').classList.add('opacity-0'); setTimeout(() => { document.getElementById('authScreen').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); updateUI(); }, 500); }
        function showPage(id, btn) { document.querySelectorAll('.page').forEach(p => p.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        function saveData() { localStorage.setItem('aslan_user_master', JSON.stringify(user)); }
        function logout() { localStorage.clear(); location.reload(); }
        setInterval(() => { if(user.energy < 1000) { user.energy += 5; updateUI(); saveData(); } }, 3000);
    </script>
</body>
</html>
