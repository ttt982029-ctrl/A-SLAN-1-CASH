<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASLAN-X | THE ILLUMINATI ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --gold-light: #fcf6ba;
            --gold-main: #d4af37;
            --gold-dark: #aa771c;
            --bg-dark: #050505;
        }

        body { 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% 0%, #1a1500 0%, #050505 70%);
            color: #ffffff; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow: hidden; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* TYPOGRAPHY */
        .font-cinzel { font-family: 'Cinzel', serif; }
        .text-gradient-gold { 
            background: linear-gradient(135deg, var(--gold-light), var(--gold-main), var(--gold-dark)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* GLASSMORPHISM & PREMIUM CARDS */
        .glass-panel {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border-radius: 24px;
        }

        /* THE 3D ILLUMINATI COIN */
        .coin-container { perspective: 1000px; }
        .coin-3d {
            width: 280px; height: 280px;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b, #111);
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.3), inset 0 0 40px rgba(0,0,0,0.8), 0 20px 50px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
            position: relative; 
            transition: transform 0.1s ease-out, box-shadow 0.1s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .coin-3d::before {
            content: ''; position: absolute; inset: -6px; border-radius: 50%;
            border: 2px dashed rgba(255, 215, 0, 0.3); animation: spin 20s linear infinite;
        }
        .coin-3d:active { transform: scale(0.9) rotateX(15deg); box-shadow: 0 0 30px rgba(212, 175, 55, 0.5), inset 0 0 60px rgba(0,0,0,0.9); }
        .illuminati-logo { width: 170px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.9)); z-index: 10; pointer-events: none; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* FLOATING TEXT ANIMATION */
        .float-text {
            position: absolute; color: var(--gold-light); font-weight: 900; font-size: 32px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.8); pointer-events: none;
            animation: floatUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; z-index: 999;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-150px) scale(1.2); } }

        /* NAVIGATION SYSTEM */
        .app-screen { display: none; flex-direction: column; height: 100%; width: 100%; animation: fadeIn 0.3s ease-in-out; }
        .app-screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* PUBG BLACKOUT */
        #transition-blackout { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; transition: opacity 0.6s ease; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="transition-blackout"></div>

    <div id="screen-login" class="fixed inset-0 z-[5000] flex flex-col items-center justify-center p-8 bg-[#020202]">
        <div class="mb-12 text-center">
            <h1 class="font-cinzel text-5xl font-black tracking-widest text-gradient-gold mb-3">ASLAN-X</h1>
            <div class="h-[1px] w-24 bg-gradient-to-r from-transparent via-yellow-600 to-transparent mx-auto mb-3"></div>
            <p class="text-[10px] tracking-[0.5em] text-gray-500 font-bold uppercase">The Illuminati Network</p>
        </div>
        
        <div class="w-full max-w-xs space-y-5">
            <div class="relative">
                <i class="fas fa-fingerprint absolute left-4 top-1/2 -translate-y-1/2 text-yellow-600/50"></i>
                <input type="text" id="auth-id" placeholder="DECENTRALIZED ID" class="w-full bg-black/50 border border-yellow-900/40 py-4 pl-12 pr-4 rounded-xl outline-none focus:border-yellow-500 transition-all text-sm font-bold tracking-widest text-yellow-100">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-yellow-600/50"></i>
                <input type="password" id="auth-key" placeholder="SECRET KEY" class="w-full bg-black/50 border border-yellow-900/40 py-4 pl-12 pr-4 rounded-xl outline-none focus:border-yellow-500 transition-all text-sm font-bold tracking-widest text-yellow-100">
            </div>
            <button onclick="authenticateUser()" class="w-full bg-gradient-to-r from-[#8a6d3b] to-[#d4af37] text-black font-cinzel font-black py-4 rounded-xl shadow-[0_0_20px_rgba(212,175,55,0.2)] active:scale-95 transition-transform tracking-widest text-lg mt-4">
                INITIALIZE
            </button>
        </div>
    </div>

    <div id="screen-main" class="hidden flex-grow flex flex-col h-full overflow-hidden">
        
        <div class="px-6 py-5 flex justify-between items-center z-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 glass-panel flex items-center justify-center border-yellow-500/30">
                    <i class="fas fa-eye text-yellow-500 text-xl shadow-yellow-500 drop-shadow-md"></i>
                </div>
                <div>
                    <p class="text-[9px] text-yellow-600 font-bold uppercase tracking-[0.4em] mb-0.5">Supreme Leader</p>
                    <p class="text-sm font-bold tracking-widest">@ADMIN_ASLAN</p>
                </div>
            </div>
            <button onclick="location.reload()" class="w-10 h-10 flex items-center justify-center rounded-full bg-red-900/10 text-red-500 hover:bg-red-900/30 transition-all border border-red-900/30">
                <i class="fas fa-power-off"></i>
            </button>
        </div>

        <div class="text-center py-2 z-10">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.3em] mb-2">Total Accumulated Assets</p>
            <div class="flex items-center justify-center gap-2">
                <span class="font-cinzel text-yellow-600 text-4xl mb-2">$</span>
                <h1 id="display-balance" class="font-cinzel text-6xl font-black tracking-tighter text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">0</h1>
            </div>
            <div class="inline-flex items-center gap-2 bg-green-900/20 border border-green-500/20 px-3 py-1 rounded-full mt-3">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <p class="text-[9px] text-green-400 font-bold uppercase tracking-widest">Auto-Yield: 150 ASLN/sec</p>
            </div>
        </div>

        <div class="flex-grow overflow-y-auto px-6 py-6 z-10 relative custom-scrollbar">
            
            <div id="tab-mining" class="app-screen active justify-center items-center">
                <div class="coin-container">
                    <div id="mining-trigger" class="coin-3d">
                        <img src="https://img.icons8.com/color/512/000000/illuminati.png" alt="Illuminati" class="illuminati-logo">
                    </div>
                </div>
            </div>

            <div id="tab-rank" class="app-screen gap-4">
                <h2 class="font-cinzel text-xl text-center text-yellow-500 mb-2 tracking-widest">Global Hierarchy</h2>
                
                <div class="glass-panel p-5 flex justify-between items-center relative overflow-hidden">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-yellow-500"></div>
                    <div class="flex items-center gap-3">
                        <span class="text-yellow-500 font-black text-lg">#1</span>
                        <span class="font-bold tracking-wider text-sm">YOU (MASTER)</span>
                    </div>
                    <span id="rank-balance-display" class="font-cinzel font-bold text-yellow-500 text-lg">1,000,000</span>
                </div>

                <div class="glass-panel p-5 flex justify-between items-center opacity-60">
                    <div class="flex items-center gap-3">
                        <span class="text-gray-400 font-black text-lg">#2</span>
                        <span class="text-sm tracking-wider text-gray-300">Satoshi_Elite</span>
                    </div>
                    <span class="font-cinzel text-gray-400">945,800</span>
                </div>

                <div class="glass-panel p-5 flex justify-between items-center opacity-40">
                    <div class="flex items-center gap-3">
                        <span class="text-gray-500 font-black text-lg">#3</span>
                        <span class="text-sm tracking-wider text-gray-400">Phantom_Node</span>
                    </div>
                    <span class="font-cinzel text-gray-500">512,300</span>
                </div>
            </div>

            <div id="tab-wallet" class="app-screen justify-center">
                <div class="glass-panel p-7 space-y-6">
                    <div class="text-center mb-2">
                        <i class="fas fa-exchange-alt text-yellow-600 text-2xl mb-2"></i>
                        <h3 class="font-cinzel text-yellow-500 font-black text-sm tracking-[0.2em] uppercase">Encrypted Transfer</h3>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-[9px] text-gray-500 font-bold tracking-widest ml-1 mb-1 block">RECIPIENT NETWORK ID</label>
                            <input type="text" id="tx-target" placeholder="e.g. ASLAN-X-009" class="w-full bg-black/60 border border-yellow-900/30 p-4 rounded-xl outline-none text-sm focus:border-yellow-500 text-yellow-100 font-mono tracking-wider">
                        </div>
                        <div>
                            <label class="text-[9px] text-gray-500 font-bold tracking-widest ml-1 mb-1 block">ASSET AMOUNT</label>
                            <input type="number" id="tx-amount" placeholder="0.00" class="w-full bg-black/60 border border-yellow-900/30 p-4 rounded-xl outline-none text-sm focus:border-yellow-500 text-yellow-100 font-mono tracking-wider">
                        </div>
                        <button onclick="executeTransfer()" class="w-full bg-gradient-to-r from-yellow-700 to-yellow-500 text-black font-bold py-4 rounded-xl active:scale-95 transition-transform tracking-widest mt-2 shadow-lg">
                            EXECUTE PROTOCOL
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <div class="px-6 pb-8 pt-2 z-10">
            <div class="glass-panel flex justify-between items-center px-4 py-3 rounded-2xl bg-black/80">
                <button onclick="switchTab('mining')" id="nav-mining" class="nav-btn w-16 h-14 rounded-xl flex flex-col items-center justify-center gap-1 text-yellow-500 transition-all bg-yellow-900/20">
                    <i class="fas fa-fingerprint text-lg"></i>
                    <span class="text-[8px] font-bold tracking-widest">MINE</span>
                </button>
                <button onclick="switchTab('rank')" id="nav-rank" class="nav-btn w-16 h-14 rounded-xl flex flex-col items-center justify-center gap-1 text-gray-500 transition-all hover:text-gray-300">
                    <i class="fas fa-trophy text-lg"></i>
                    <span class="text-[8px] font-bold tracking-widest">RANK</span>
                </button>
                <button onclick="switchTab('wallet')" id="nav-wallet" class="nav-btn w-16 h-14 rounded-xl flex flex-col items-center justify-center gap-1 text-gray-500 transition-all hover:text-gray-300">
                    <i class="fas fa-wallet text-lg"></i>
                    <span class="text-[8px] font-bold tracking-widest">WALLET</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // System Variables
        let userBalance = parseInt(localStorage.getItem('aslan_v4_balance')) || 0;
        let isFirstInitialization = localStorage.getItem('aslan_v4_init') === null;
        
        // Element References
        const balDisplay = document.getElementById('display-balance');
        const rankBalDisplay = document.getElementById('rank-balance-display');
        const blackoutLayer = document.getElementById('transition-blackout');

        // Core Functions
        function syncData() {
            const formatted = userBalance.toLocaleString('en-US');
            balDisplay.innerText = formatted;
            rankBalDisplay.innerText = formatted;
            localStorage.setItem('aslan_v4_balance', userBalance);
        }

        function authenticateUser() {
            const idInput = document.getElementById('auth-id').value;
            if(!idInput) {
                alert("SYSTEM ERROR: Identification Required");
                return;
            }

            // PUBG Style Blackout Transition
            blackoutLayer.style.display = 'block';

            setTimeout(() => {
                // Admin Grant on First Login
                if(isFirstInitialization) {
                    userBalance = 1000000;
                    localStorage.setItem('aslan_v4_init', 'secured');
                }
                
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('screen-main').classList.remove('hidden');
                syncData();

                setTimeout(() => {
                    blackoutLayer.style.opacity = '0';
                    setTimeout(() => blackoutLayer.style.display = 'none', 600);
                }, 300);
            }, 800);
        }

        // Navigation Logic (Flawless Tab Switching)
        function switchTab(targetTab) {
            // Hide all tabs
            document.querySelectorAll('.app-screen').forEach(screen => {
                screen.classList.remove('active');
            });
            
            // Show target tab
            document.getElementById(`tab-${targetTab}`).classList.add('active');
            
            // Update Nav UI
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-yellow-500', 'bg-yellow-900/20');
                btn.classList.add('text-gray-500');
            });
            
            const activeBtn = document.getElementById(`nav-${targetTab}`);
            activeBtn.classList.remove('text-gray-500');
            activeBtn.classList.add('text-yellow-500', 'bg-yellow-900/20');
        }

        // Mining Interaction (Tap)
        document.getElementById('mining-trigger').addEventListener('touchstart', (e) => {
            e.preventDefault();
            userBalance += 1000; // High tier reward for Elite
            
            // Visual Feedback FX
            const touch = e.touches[0];
            const fx = document.createElement('div');
            fx.className = 'float-text font-cinzel'; 
            fx.innerText = '+$1000';
            fx.style.left = `${touch.clientX - 30}px`; 
            fx.style.top = `${touch.clientY - 20}px`;
            document.body.appendChild(fx);
            
            // Clean up DOM
            setTimeout(() => fx.remove(), 800);
            syncData();
        });

        // Autonomous Yield Generation (Auto-Mining)
        setInterval(() => {
            if(!document.getElementById('screen-main').classList.contains('hidden')) {
                userBalance += 150; 
                syncData();
            }
        }, 1000);

        // P2P Transfer System
        function executeTransfer() {
            const amount = parseInt(document.getElementById('tx-amount').value);
            const target = document.getElementById('tx-target').value;
            
            if(!target || isNaN(amount) || amount > userBalance || amount <= 0) {
                alert("TRANSACTION FAILED: Insufficient Funds or Invalid Parameters");
                return;
            }
            
            userBalance -= amount;
            syncData();
            
            // Reset fields
            document.getElementById('tx-amount').value = '';
            document.getElementById('tx-target').value = '';
            
            alert(`SUCCESS: ${amount.toLocaleString()} ASLN securely transferred to ${target}`);
            switchTab('mining'); // Redirect back to home
        }

        // Init
        syncData();
    </script>
</body>
</html>
