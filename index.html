<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A-SLAN CASH ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: manipulation; }
        .glass { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .coin-btn { transition: transform 0.05s ease; cursor: pointer; }
        .coin-btn:active { transform: scale(0.94); }
        .progress-ring { transition: stroke-dashoffset 0.1s linear; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .nav-active { color: #eab308; border-top: 2px solid #eab308; }
    </style>
</head>
<body class="flex flex-col h-screen p-4 items-center">

    <div class="w-full max-w-sm glass p-4 rounded-[2rem] flex justify-between items-center mt-2 shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="bg-yellow-500/20 p-2 rounded-full">💰</div>
            <div>
                <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">My Wealth</p>
                <h2 id="balance" class="text-3xl font-black text-yellow-500 tracking-tighter">0</h2>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-yellow-500 font-bold">100 TAPS = 1 COIN</p>
            <p id="tap-counter" class="text-xs font-mono text-gray-500">TAPS: 0/100</p>
        </div>
    </div>

    <div id="insta-card" class="w-full max-w-sm bg-gradient-to-r from-blue-700 via-purple-700 to-pink-700 p-[1px] rounded-2xl mt-4">
        <div class="bg-black/90 p-3 rounded-2xl flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl">📸</span>
                <p class="text-xs font-bold">Follow for +5 Coins</p>
            </div>
            <button onclick="doInstaTask()" class="bg-white text-black px-4 py-1 rounded-full font-black text-[10px]">GO</button>
        </div>
    </div>

    <div class="relative flex items-center justify-center grow w-full" onclick="handleTap(event)">
        <svg class="absolute w-80 h-80">
            <circle cx="160" cy="160" r="145" stroke="rgba(255,255,255,0.05)" stroke-width="10" fill="transparent" />
            <circle id="progress-circle" cx="160" cy="160" r="145" stroke="#eab308" stroke-width="10" fill="transparent" 
                stroke-dasharray="911" stroke-dashoffset="911" stroke-linecap="round" class="progress-ring" />
        </svg>
        <div class="coin-btn w-64 h-64 bg-gradient-to-br from-yellow-300 via-yellow-500 to-yellow-800 rounded-full border-[12px] border-yellow-900 shadow-[0_0_80px_rgba(234,179,8,0.25)] flex items-center justify-center">
            <span class="text-9xl font-black text-yellow-950 select-none">A</span>
        </div>
    </div>

    <div class="w-full max-w-sm glass p-5 rounded-[2.5rem] mb-20">
        <div class="flex gap-4 mb-4">
            <div class="flex-1">
                <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">Send Coins</p>
                <input id="send-amt" type="number" placeholder="Amt" class="w-full bg-white/5 border border-white/10 p-2 rounded-xl text-xs">
                <button onclick="sendCoins()" class="w-full bg-yellow-600 mt-2 py-2 rounded-xl text-[10px] font-bold uppercase">Generate Code</button>
            </div>
            <div class="flex-1 border-l border-white/10 pl-4">
                <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">Redeem</p>
                <input id="redeem-code" type="text" placeholder="Code" class="w-full bg-white/5 border border-white/10 p-2 rounded-xl text-xs">
                <button onclick="redeemCoins()" class="w-full bg-blue-600 mt-2 py-2 rounded-xl text-[10px] font-bold uppercase">Collect</button>
            </div>
        </div>
        
        <div class="flex justify-between items-center text-xs font-bold border-t border-white/10 pt-4">
            <div class="flex items-center gap-1">⚡ <span id="energy-text">500 / 500</span></div>
            <div class="grow mx-4 h-2 bg-gray-800 rounded-full overflow-hidden">
                <div id="energy-bar" class="bg-yellow-500 h-full w-full"></div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 w-full h-16 glass border-t border-white/10 flex justify-around items-center px-4">
        <div class="flex flex-col items-center nav-active pt-2 px-4 italic font-bold">🏠<span>Home</span></div>
        <div class="flex flex-col items-center text-gray-500 font-bold" onclick="alert('Shop coming soon!')">🛒<span>Shop</span></div>
        <div class="flex flex-col items-center text-gray-500 font-bold" onclick="alert('Friends list loading...')">👥<span>Friends</span></div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('aslan_bal'));
        let taps = parseInt(localStorage.getItem('aslan_taps')) || 0;
        let energy = parseInt(localStorage.getItem('aslan_energy')) || 500;
        let taskDone = localStorage.getItem('aslan_insta_5') === 'true';

        // Welcome Bonus
        if (isNaN(balance)) {
            balance = 100;
            save();
            alert("🎊 Welcome! 100 Coins added for joining.");
        }

        if(taskDone) document.getElementById('insta-card').style.display = 'none';

        function handleTap(e) {
            if (energy > 0) {
                taps++;
                energy--;
                if (taps >= 100) {
                    balance += 1;
                    taps = 0;
                    if(navigator.vibrate) navigator.vibrate(50);
                }
                save();
                updateUI();
                showFloat(e.clientX, e.clientY);
            }
        }

        function doInstaTask() {
            window.open('https://instagram.com/your_username', '_blank');
            if(!taskDone) {
                balance += 5;
                taskDone = true;
                localStorage.setItem('aslan_insta_5', 'true');
                document.getElementById('insta-card').style.display = 'none';
                save();
                updateUI();
                alert("Success! 5 Coins added.");
            }
        }

        function sendCoins() {
            let amt = parseInt(document.getElementById('send-amt').value);
            if(amt > 0 && balance >= amt) {
                balance -= amt;
                let code = "ASLAN-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                let v = JSON.parse(localStorage.getItem('db_v') || "{}");
                v[code] = amt;
                localStorage.setItem('db_v', JSON.stringify(v));
                save(); updateUI();
                prompt("Copy this code and give it to the buyer:", code);
            } else { alert("Insufficient coins!"); }
        }

        function redeemCoins() {
            let code = document.getElementById('redeem-code').value.trim().toUpperCase();
            let v = JSON.parse(localStorage.getItem('db_v') || "{}");
            if(v[code]) {
                balance += v[code];
                delete v[code];
                localStorage.setItem('db_v', JSON.stringify(v));
                save(); updateUI();
                alert("Redeemed successfully!");
            } else { alert("Invalid code!"); }
        }

        function showFloat(x, y) {
            let el = document.createElement('div');
            el.innerText = "+1";
            el.className = "absolute text-yellow-500 font-black pointer-events-none";
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => { el.style.transform = "translateY(-100px)"; el.style.opacity = "0"; el.style.transition = "0.6s"; }, 10);
            setTimeout(() => el.remove(), 700);
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toLocaleString();
            document.getElementById('tap-counter').innerText = `TAPS: ${taps}/100`;
            document.getElementById('energy-text').innerText = `${energy} / 500`;
            document.getElementById('energy-bar').style.width = (energy/5) + '%';
            document.getElementById('progress-circle').style.strokeDashoffset = 911 - (taps / 100 * 911);
        }

        function save() {
            localStorage.setItem('aslan_bal', balance);
            localStorage.setItem('aslan_taps', taps);
            localStorage.setItem('aslan_energy', energy);
        }

        setInterval(() => { if(energy < 500) { energy++; updateUI(); save(); } }, 2000);
        updateUI();
    </script>
</body>
</html>
