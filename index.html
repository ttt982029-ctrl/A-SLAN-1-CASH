<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A-SLAN | Secret Key Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .page { display: none; height: 80vh; overflow-y: auto; padding-bottom: 120px; }
        .active-page { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .nav-active { color: #f59e0b; border-bottom: 3px solid #f59e0b; }
        .menu-drop { display: none; position: absolute; right: 10px; top: 60px; z-index: 1000; width: 150px; }
        .menu-active { display: block; }
    </style>
</head>
<body>

    <div id="authScreen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[50px] text-center border-amber-500/20 border shadow-2xl">
            <h1 class="text-5xl font-black mb-1 text-amber-500 italic tracking-tighter">A-SLAN</h1>
            <p class="text-[9px] text-gray-500 uppercase tracking-[0.4em] mb-10 font-bold">Secure Access</p>
            <div class="space-y-4">
                <input type="text" id="authName" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center outline-none focus:border-amber-500">
                <input type="password" id="authPass" placeholder="Security Code" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center outline-none focus:border-amber-500">
                <button onclick="handleAuth()" class="w-full bg-amber-500 text-black font-black p-4 rounded-3xl active:scale-95 transition-all">CONNECT</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-4 flex justify-between items-center glass m-4 rounded-[25px] relative">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-amber-500 flex items-center justify-center text-black font-black shadow-lg shadow-amber-500/20">🦁</div>
                <div>
                    <p id="topName" class="text-[10px] font-black uppercase text-white"></p>
                    <span id="rankBadge" class="text-[8px] font-black text-amber-500 uppercase">IDENTIFIED</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <p id="balance" class="text-xl font-black text-amber-500 tracking-tighter">0</p>
                <button onclick="toggleMenu()" class="text-gray-400 p-1"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            </div>
            <div id="dropMenu" class="menu-drop glass rounded-2xl p-2 border border-white/10">
                <button onclick="logout()" class="w-full text-left p-3 text-red-500 text-xs font-bold uppercase rounded-xl">Logout</button>
            </div>
        </header>

        <div class="fixed right-6 bottom-32 z-[150]">
            <button onclick="openSendModal()" class="w-14 h-14 bg-amber-500 rounded-full flex items-center justify-center border-4 border-black active:scale-90 shadow-lg shadow-amber-500/20">
                <i class="fa-solid fa-paper-plane text-black"></i>
            </button>
            <p class="text-[7px] text-center font-black text-amber-500 uppercase mt-1">Transfer</p>
        </div>

        <main class="px-6">
            <div id="minePage" class="page active-page text-center pt-10">
                <p id="tapRate" class="text-[9px] text-amber-500/60 uppercase font-black tracking-widest mb-6">Rate: 5 ASL/Tap</p>
                <button onclick="tap()" class="active:scale-90 transition-transform">
                    <div class="w-64 h-64 rounded-full bg-gradient-to-br from-amber-400 to-amber-900 p-1.5 shadow-[0_0_50px_rgba(245,158,11,0.2)]">
                        <div class="w-full h-full rounded-full bg-black flex items-center justify-center border border-white/10">
                            <span class="text-7xl">🦁</span>
                        </div>
                    </div>
                </button>
                <div class="mt-14 glass p-5 rounded-[30px]">
                    <div class="flex justify-between text-[9px] mb-2 font-black text-gray-500 uppercase"><span>Energy</span><span id="energyText">1000/1000</span></div>
                    <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden"><div id="energyBar" class="h-full bg-amber-500 rounded-full w-full"></div></div>
                </div>
            </div>

            <div id="rankPage" class="page pt-4"><div id="leaderList" class="space-y-3"></div></div>
        </main>

        <nav class="fixed bottom-0 w-full glass h-20 flex justify-around items-center rounded-t-[40px] border-t border-white/10 z-[200]">
            <button onclick="showPage('minePage', this)" class="flex flex-col items-center gap-1 nav-active text-amber-500"><i class="fa-solid fa-bolt text-xl"></i><span class="text-[8px] font-bold uppercase">Mine</span></button>
            <button onclick="showPage('rankPage', this)" class="flex flex-col items-center gap-1 text-gray-500"><i class="fa-solid fa-trophy text-xl"></i><span class="text-[8px] font-bold uppercase">Rank</span></button>
            <button onclick="openReceiveModal()" class="flex flex-col items-center gap-1 text-gray-500"><i class="fa-solid fa-hand-holding-dollar text-xl"></i><span class="text-[8px] font-bold uppercase">Receive</span></button>
        </nav>
    </div>

    <div id="sendModal" class="hidden fixed inset-0 z-[300] bg-black/90 flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="glass w-full max-w-sm p-8 rounded-[40px] border border-amber-500/30">
            <h2 class="text-lg font-black text-amber-500 mb-6 uppercase italic">Create Transfer</h2>
            <div id="step1">
                <input type="number" id="amtInput" placeholder="How many coins?" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center mb-4 focus:border-amber-500 outline-none font-bold">
                <button onclick="goToStep2()" class="w-full bg-amber-500 text-black font-black p-4 rounded-2xl uppercase text-xs">Next Step</button>
            </div>
            <div id="step2" class="hidden">
                <p class="text-[10px] text-gray-400 mb-4 uppercase font-bold">Create a 3-Character Password:</p>
                <input type="text" id="customPass" maxlength="3" placeholder="e.g. 786" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center mb-4 focus:border-amber-500 outline-none font-black text-xl tracking-[1em]">
                <button onclick="finalizeSend()" class="w-full bg-amber-500 text-black font-black p-4 rounded-2xl uppercase text-xs">Lock & Share</button>
            </div>
            <button onclick="closeModals()" class="mt-4 text-[10px] text-gray-500 uppercase font-bold">Cancel</button>
        </div>
    </div>

    <div id="receiveModal" class="hidden fixed inset-0 z-[300] bg-black/90 flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="glass w-full max-w-sm p-8 rounded-[40px] border border-blue-500/30">
            <h2 class="text-lg font-black text-blue-500 mb-6 uppercase italic">Receive Coins</h2>
            <p class="text-[10px] text-gray-400 mb-4 uppercase font-bold">Enter the 3-Character Password:</p>
            <input type="text" id="claimPass" maxlength="3" placeholder="???" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center mb-6 focus:border-blue-500 outline-none font-black text-xl tracking-[1em]">
            <button onclick="claimCoins()" class="w-full bg-blue-500 text-white font-black p-4 rounded-2xl uppercase text-xs">Claim ASL</button>
            <button onclick="closeModals()" class="mt-4 text-[10px] text-gray-500 uppercase font-bold">Cancel</button>
        </div>
    </div>

    <script>
        let userData = { name: "", pass: "", balance: 0, energy: 1000, position: 0 };
        const REG_KEY = 'aslan_reg_order';
        const TRX_KEY = 'aslan_secret_trx'; // Global store for transactions

        window.onload = function() {
            const saved = localStorage.getItem('aslan_user');
            if(saved) { userData = JSON.parse(saved); enterApp(); }
        }

        function toggleMenu() { document.getElementById('dropMenu').classList.toggle('menu-active'); }

        function handleAuth() {
            const name = document.getElementById('authName').value;
            const pass = document.getElementById('authPass').value;
            if(name === "DR. HELP" && pass === "143143") {
                userData = JSON.parse(localStorage.getItem('aslan_user')) || { name, pass, balance: 10000000, energy: 1000, position: 1 };
                saveData(); enterApp();
            } else if(name && pass) {
                let count = parseInt(localStorage.getItem(REG_KEY)) || 1;
                count++; localStorage.setItem(REG_KEY, count);
                let bonus = (count === 2 || count === 3) ? 100000 : 0;
                userData = { name, pass, balance: bonus, energy: 1000, position: count };
                saveData(); enterApp();
            }
        }

        function tap() {
            if(userData.energy <= 0) return;
            let pwr = (userData.position === 1) ? 500 : (userData.position <= 3 ? 100 : 5);
            userData.balance += pwr; userData.energy -= 1;
            updateUI(); saveData();
        }

        function updateUI() {
            document.getElementById('topName').innerText = userData.name;
            document.getElementById('balance').innerText = Math.floor(userData.balance).toLocaleString();
            document.getElementById('energyBar').style.width = (userData.energy/10) + "%";
            document.getElementById('energyText').innerText = userData.energy + "/1000";
            document.getElementById('tapRate').innerText = `Rate: ${(userData.position === 1 ? 500 : (userData.position <= 3 ? 100 : 5))} ASL/Tap`;
        }

        // --- TRANSFER LOGIC ---
        function openSendModal() { document.getElementById('sendModal').classList.remove('hidden'); }
        function openReceiveModal() { document.getElementById('receiveModal').classList.remove('hidden'); }
        function closeModals() { 
            document.querySelectorAll('#sendModal, #receiveModal').forEach(m => m.classList.add('hidden')); 
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
        }

        function goToStep2() {
            let amt = parseInt(document.getElementById('amtInput').value);
            if(amt > 0 && amt <= userData.balance) {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } else alert("Invalid Amount!");
        }

        function finalizeSend() {
            let amt = parseInt(document.getElementById('amtInput').value);
            let pass = document.getElementById('customPass').value;
            if(pass.length !== 3) return alert("Password must be exactly 3 characters!");

            let pending = JSON.parse(localStorage.getItem(TRX_KEY) || "[]");
            pending.push({ key: pass, amount: amt });
            localStorage.setItem(TRX_KEY, JSON.stringify(pending));

            userData.balance -= amt;
            saveData(); updateUI();
            alert(`Locked! Tell your friend the password: ${pass}`);
            closeModals();
        }

        function claimCoins() {
            let pass = document.getElementById('claimPass').value;
            let pending = JSON.parse(localStorage.getItem(TRX_KEY) || "[]");
            let index = pending.findIndex(t => t.key === pass);

            if(index !== -1) {
                let amt = pending[index].amount;
                userData.balance += amt;
                pending.splice(index, 1);
                localStorage.setItem(TRX_KEY, JSON.stringify(pending));
                saveData(); updateUI();
                alert(`Success! Received ${amt} ASL`);
                closeModals();
            } else alert("Wrong Password or No Coins Found!");
        }

        function enterApp() { document.getElementById('authScreen').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); updateUI(); }
        function showPage(id, btn) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById(id).classList.add('active-page'); }
        function saveData() { localStorage.setItem('aslan_user', JSON.stringify(userData)); }
        function logout() { localStorage.clear(); location.reload(); }
        setInterval(() => { if(userData.energy < 1000) { userData.energy += 5; updateUI(); saveData(); } }, 3000);
    </script>
</body>
</html>
