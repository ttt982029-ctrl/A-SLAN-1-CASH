<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ASLAN-X | Global Protocol</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #f59e0b; --bg: #000; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* The 6-Dot Menu Button */
        .dots-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; width: 24px; cursor: pointer; }
        .dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 5px var(--gold); }

        /* Professional Dashboard & Menu Overlay */
        #sideMenu { transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #sideMenu.active { transform: translateX(0); }

        /* Morphing Illuminati Orb */
        .orb-outer {
            width: 280px; height: 280px;
            background: radial-gradient(circle, #f59e0b 0%, #78350f 70%, #000 100%);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: morph 8s linear infinite;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 60px rgba(245, 158, 11, 0.2);
            transition: transform 0.1s;
        }
        @keyframes morph {
            0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
        }
        .orb-outer:active { transform: scale(0.92); }

        /* Coin Pop Animation */
        .coin-pop { position: absolute; color: white; font-weight: 900; font-size: 32px; pointer-events: none; 
                    animation: popUp 0.7s ease-out forwards; text-shadow: 0 0 10px var(--gold); }
        @keyframes popUp { to { opacity: 0; transform: translateY(-120px); } }

        .hidden-page { display: none; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="sideMenu" class="fixed inset-0 z-[2000] bg-black/95 flex justify-end">
        <div class="w-[85%] h-full bg-[#0a0a0a] border-l border-white/10 p-6 flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-amber-500 font-black italic tracking-widest">DASHBOARD</h3>
                <button onclick="toggleMenu()" class="text-2xl text-white">&times;</button>
            </div>
            
            <div class="space-y-6 flex-1 overflow-y-auto">
                <div class="glass p-4 rounded-2xl">
                    <p class="text-[10px] text-gray-500 font-bold mb-2 uppercase">Core Status</p>
                    <div class="flex justify-between items-center">
                        <span id="dashName" class="text-lg font-bold">---</span>
                        <span class="text-green-500 text-xs font-black">ACTIVE</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button class="glass p-4 rounded-2xl flex flex-col items-center gap-2">
                        <i class="fa-solid fa-chart-line text-amber-500"></i>
                        <span class="text-[9px] font-bold">ANALYTICS</span>
                    </button>
                    <button class="glass p-4 rounded-2xl flex flex-col items-center gap-2">
                        <i class="fa-solid fa-language text-amber-500"></i>
                        <select id="langSelect" onchange="changeLang()" class="bg-transparent text-[9px] font-bold outline-none">
                            <option value="en">ENGLISH</option>
                            <option value="hi">HINDI</option>
                            <option value="es">ESPAÑOL</option>
                            <option value="ar">ARABIC</option>
                            <option value="bn">BENGALI</option>
                        </select>
                    </button>
                </div>

                <div class="glass p-4 rounded-2xl space-y-4">
                    <p class="text-[10px] text-gray-500 font-bold uppercase">System Control</p>
                    <button onclick="logout()" class="w-full text-left text-red-500 text-sm font-bold py-2 border-b border-white/5"><i class="fa-solid fa-power-off mr-3"></i>Terminated Session</button>
                    <button onclick="toggleMenu()" class="w-full text-left text-white text-sm font-bold py-2"><i class="fa-solid fa-circle-user mr-3"></i>User Profile</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="flex flex-col h-screen">
        <header class="p-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center text-black font-black">A</div>
                <div class="text-[10px] font-black uppercase tracking-tighter" id="topName">---</div>
            </div>
            <div class="dots-6" onclick="toggleMenu()">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </header>

        <main class="flex-1 overflow-hidden relative">
            
            <div id="minePage" class="page h-full flex flex-col items-center justify-center px-6">
                <div class="text-center mb-10">
                    <p class="text-[9px] text-gray-500 font-black tracking-[0.4em] uppercase mb-1">Decentralized Asset</p>
                    <div class="flex items-center justify-center gap-2">
                        <h2 id="balance" class="text-6xl font-black italic tracking-tighter">0</h2>
                    </div>
                </div>

                <div class="orb-outer" id="tapZone">
                    <div class="relative w-32 h-32 flex items-center justify-center">
                        <div class="absolute inset-0 bg-amber-500 clip-path-[polygon(50%_0%,0%_100%,100%_100%)] opacity-80" style="clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></div>
                        <div class="w-6 h-6 bg-white rounded-full z-10 shadow-[0_0_20px_#fff]"></div>
                    </div>
                </div>

                <div class="w-full max-w-xs mt-16 px-2">
                    <div class="flex justify-between text-[10px] font-black text-amber-500 mb-2 uppercase tracking-widest">
                        <span>Core Energy</span>
                        <span id="engText">1000/1000</span>
                    </div>
                    <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden border border-white/5">
                        <div id="engBar" class="h-full bg-amber-500 w-full transition-all"></div>
                    </div>
                </div>
            </div>

            <div id="rankPage" class="page hidden-page h-full p-6 flex flex-col">
                <h2 class="text-2xl font-black italic text-amber-500 mb-6 tracking-widest">GLOBAL COUNCIL</h2>
                <div id="rankList" class="flex-1 space-y-3 overflow-y-auto pr-2 pb-24">
                    </div>
            </div>
        </main>

        <nav class="h-24 glass rounded-t-[40px] flex justify-around items-center px-6">
            <button onclick="showPage('minePage', this)" class="nav-btn active text-amber-500 flex flex-col items-center gap-1">
                <i class="fa-solid fa-ghost text-2xl"></i><span class="text-[8px] font-black uppercase">Mine</span>
            </button>
            <button onclick="showPage('rankPage', this)" class="nav-btn text-gray-600 flex flex-col items-center gap-1">
                <i class="fa-solid fa-crown text-2xl"></i><span class="text-[8px] font-black uppercase">Council</span>
            </button>
            <button class="nav-btn text-gray-600 flex flex-col items-center gap-1 opacity-30">
                <i class="fa-solid fa-wallet text-2xl"></i><span class="text-[8px] font-black uppercase">Sync</span>
            </button>
        </nav>
    </div>

    <div id="authScreen" class="fixed inset-0 z-[3000] bg-black flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-black italic text-white mb-2">ASLAN-X</h1>
        <p class="text-[9px] text-gray-500 tracking-[0.5em] mb-12">SECURE INITIALIZATION</p>
        <div class="w-full max-w-sm space-y-4">
            <input type="text" id="uIn" placeholder="IDENTITY" class="w-full bg-[#111] p-5 rounded-2xl border border-white/10 text-center font-bold outline-none focus:border-amber-500">
            <input type="password" id="pIn" placeholder="MASTER CODE" class="w-full bg-[#111] p-5 rounded-2xl border border-white/10 text-center font-bold outline-none focus:border-amber-500">
            <button onclick="handleLogin()" class="w-full bg-amber-500 text-black font-black py-5 rounded-2xl active:scale-95 transition-all">CONNECT CORE</button>
        </div>
    </div>

    <script>
        let state = { name: "", bal: 0, energy: 1000, pos: 1 };
        const STORAGE_KEY = 'aslan_global_v1';
        const LEADERBOARD_KEY = 'aslan_global_leaderboard';

        // --- Core Functions ---
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

        function handleLogin() {
            const n = document.getElementById('uIn').value.toUpperCase();
            const p = document.getElementById('pIn').value;
            if(!n || !p) return;

            if(n === "DR. HELP" && p === "143143") {
                state = { name: n, bal: 10000000, energy: 1000, pos: 1 };
            } else {
                let count = parseInt(localStorage.getItem('user_total_count')) || 1;
                count++; localStorage.setItem('user_total_count', count);
                state = { name: n, bal: 0, energy: 1000, pos: count };
            }
            saveState(); updateLeaderboard();
            document.getElementById('authScreen').classList.add('hidden');
            refreshUI();
        }

        document.getElementById('tapZone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            for(let i=0; i<e.touches.length; i++){
                if(state.energy <= 0) break;
                let gain = (state.name === "DR. HELP") ? 500 : 10;
                state.bal += gain; state.energy -= 1;
                createPop(e.touches[i].pageX, e.touches[i].pageY, gain);
            }
            refreshUI(); saveState();
        });

        function createPop(x, y, val) {
            const div = document.createElement('div');
            div.className = 'coin-pop';
            div.innerText = `+${val}`;
            div.style.left = `${x-20}px`; div.style.top = `${y-60}px`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 700);
        }

        function refreshUI() {
            document.getElementById('balance').innerText = Math.floor(state.bal).toLocaleString();
            document.getElementById('topName').innerText = state.name;
            document.getElementById('dashName').innerText = state.name;
            document.getElementById('engText').innerText = `${state.energy}/1000`;
            document.getElementById('engBar').style.width = (state.energy/10) + "%";
            if(document.getElementById('rankPage').classList.contains('active')) buildRankings();
        }

        // --- Live Leaderboard Mockup ---
        function updateLeaderboard() {
            let board = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]");
            let idx = board.findIndex(u => u.name === state.name);
            if(idx !== -1) board[idx].bal = state.bal;
            else board.push({ name: state.name, bal: state.bal });
            board.sort((a,b) => b.bal - a.bal);
            localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(board.slice(0, 50)));
        }

        function buildRankings() {
            updateLeaderboard();
            const list = document.getElementById('rankList');
            const board = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || "[]");
            list.innerHTML = board.map((u, i) => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center ${u.name === state.name ? 'border-amber-500/50' : ''}">
                    <div class="flex items-center gap-4">
                        <span class="font-black text-amber-500">#${i+1}</span>
                        <span class="font-bold text-sm uppercase">${u.name}</span>
                    </div>
                    <span class="font-black text-white">${Math.floor(u.bal).toLocaleString()}</span>
                </div>
            `).join('');
        }

        // --- Navigation ---
        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => { p.classList.add('hidden-page'); p.classList.remove('active'); });
            const activePage = document.getElementById(id);
            activePage.classList.remove('hidden-page');
            activePage.classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-amber-500', 'text-gray-600'));
            btn.classList.replace('text-gray-600', 'text-amber-500');
            refreshUI();
        }

        function changeLang() {
            const l = document.getElementById('langSelect').value;
            alert("Language protocol shifted to: " + l.toUpperCase());
        }

        function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if(saved) {
                state = JSON.parse(saved);
                document.getElementById('authScreen').classList.add('hidden');
                refreshUI();
            }
        };

        setInterval(() => { if(state.energy < 1000) { state.energy += 5; refreshUI(); saveState(); } }, 3000);
    </script>
</body>
</html>
