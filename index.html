<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASLAN-X | 3D CRYPTO MINER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; perspective: 1000px; }
        
        /* 3D Rotating Coin Effect */
        .coin-3d {
            width: 260px; height: 260px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s;
            cursor: pointer;
        }
        .coin-3d:active { transform: rotateX(20deg) scale(0.9); }
        
        .coin-face {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f3ba2f, #8c6a15);
            border: 4px solid #f3ba2f;
            box-shadow: 0 20px 50px rgba(243, 186, 47, 0.4), inset 0 0 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            backface-visibility: hidden;
        }

        /* Glassmorphism Trading Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        /* Moving Graph Simulation */
        .graph-line {
            height: 40px; width: 100%;
            background: linear-gradient(90deg, transparent, #22c55e, transparent);
            mask-image: linear-gradient(to right, rgba(0,0,0,0), rgba(0,0,0,1), rgba(0,0,0,0));
            animation: moveGraph 2s infinite linear;
        }
        @keyframes moveGraph { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .tap-float {
            position: absolute; color: #22c55e; font-weight: 900; font-size: 32px;
            pointer-events: none; animation: fly 0.7s ease-out forwards; text-shadow: 0 0 10px #22c55e;
        }
        @keyframes fly { 0% { opacity: 1; transform: translateZ(50px) translateY(0); } 100% { opacity: 0; transform: translateZ(100px) translateY(-150px); } }

        #transition-layer { position: fixed; inset: 0; background: black; z-index: 1000; display: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="transition-layer"></div>

    <div id="login-screen" class="fixed inset-0 z-[500] bg-black flex flex-col items-center justify-center p-8">
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-black tracking-tighter text-yellow-500 mb-2">ASLAN-X</h1>
            <p class="text-gray-500 text-xs tracking-[0.3em]">3D CRYPTO TERMINAL</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <input type="text" id="user" placeholder="DECENTRALIZED ID" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl outline-none focus:border-yellow-600">
            <input type="password" id="pass" placeholder="SECRET KEY" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl outline-none focus:border-yellow-600">
            <button onclick="enterEcosystem()" class="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl shadow-lg shadow-yellow-500/20 active:scale-95 transition-all">
                INITIALIZE TRADING
            </button>
        </div>
    </div>

    <div id="game-screen" class="hidden flex-grow flex flex-col p-4">
        <div class="glass-card p-4 flex justify-between items-center mb-6">
            <div>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Aslan/USDT</p>
                <h3 class="text-green-500 font-mono font-bold">$0.000432 <span class="text-[8px]">+12.4%</span></h3>
            </div>
            <div class="w-24 overflow-hidden h-8 bg-black/40 rounded flex items-center">
                <div class="graph-line"></div>
            </div>
            <button onclick="location.reload()"><i class="fas fa-ellipsis-v text-gray-600"></i></button>
        </div>

        <div class="text-center mb-4">
            <h2 id="balance" class="text-5xl font-black tracking-tighter">0</h2>
            <p class="text-yellow-500 text-[10px] font-bold tracking-[0.3em] uppercase mt-1">Staked Assets</p>
        </div>

        <div class="flex-grow flex items-center justify-center">
            <div id="tap-target" class="coin-3d">
                <div class="coin-face">
                    <div class="text-center">
                        <img src="https://img.icons8.com/ios-filled/100/ffffff/triangle.png" class="absolute inset-0 m-auto opacity-10 w-48">
                        <img src="https://img.icons8.com/color/180/000000/lion.png" class="w-40 drop-shadow-2xl">
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card p-5 mb-4">
            <div class="flex justify-between items-end mb-2">
                <span class="text-[10px] font-bold tracking-widest text-gray-400">MINING POWER ⚡</span>
                <span class="text-xs font-mono"><span id="energy">1000</span>/1000</span>
            </div>
            <div class="w-full bg-black/50 h-2 rounded-full border border-white/5">
                <div id="energy-bar" class="bg-gradient-to-r from-yellow-600 to-yellow-300 h-full w-full shadow-[0_0_10px_#f3ba2f]"></div>
            </div>
        </div>

        <div class="flex justify-around items-center py-2 opacity-60">
            <div class="flex flex-col items-center gap-1 text-yellow-500"><i class="fas fa-layer-group"></i><span class="text-[8px] font-bold">TRADE</span></div>
            <div class="flex flex-col items-center gap-1"><i class="fas fa-bolt"></i><span class="text-[8px] font-bold">FARM</span></div>
            <div class="flex flex-col items-center gap-1"><i class="fas fa-wallet"></i><span class="text-[8px] font-bold">ASSETS</span></div>
        </div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('aslan_3d_bal')) || 0;
        let energy = 1000;

        function enterEcosystem() {
            if(!document.getElementById('user').value) return alert("Enter ID");
            const tl = document.getElementById('transition-layer');
            tl.style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-screen').classList.remove('hidden');
                updateUI();
                setTimeout(() => {
                    tl.style.opacity = '0';
                    setTimeout(() => tl.style.display = 'none', 500);
                }, 300);
            }, 800);
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toLocaleString();
            document.getElementById('energy').innerText = energy;
            document.getElementById('energy-bar').style.width = (energy / 10) + '%';
            localStorage.setItem('aslan_3d_bal', balance);
        }

        document.getElementById('tap-target').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (energy >= 5) {
                balance += 25; // High value for trading feel
                energy -= 5;
                
                // 3D Tilt Effect on Tap
                const coin = document.getElementById('tap-target');
                coin.style.transform = `rotateX(${Math.random() * 20 - 10}deg) rotateY(${Math.random() * 20 - 10}deg) scale(0.95)`;
                setTimeout(() => coin.style.transform = '', 100);

                const touch = e.touches[0];
                const float = document.createElement('div');
                float.className = 'tap-float';
                float.innerText = '+$25';
                float.style.left = touch.clientX + 'px';
                float.style.top = touch.clientY + 'px';
                document.body.appendChild(float);
                setTimeout(() => float.remove(), 700);
                
                updateUI();
            }
        });

        // Energy Recovery
        setInterval(() => {
            if (energy < 1000) {
                energy = Math.min(1000, energy + 4);
                updateUI();
            }
        }, 1200);
    </script>
</body>
</html>
