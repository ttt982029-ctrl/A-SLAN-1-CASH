<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ASLAN CASH v2</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #111, #000);
  color: #ffd700;
  font-family: monospace;
}

.coin {
  width:180px;
  height:180px;
  border-radius:50%;
  background:linear-gradient(145deg,#ffd700,#a67c00);
  box-shadow:0 0 40px gold;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.bar {
  height:10px;
  background:rgba(255,255,255,0.1);
  border-radius:5px;
}

.fill {
  height:100%;
  background:gold;
  border-radius:5px;
}

.tapFx {
  position:absolute;
  animation: rise 1s forwards;
}

@keyframes rise {
  0%{opacity:1;}
  100%{opacity:0; transform:translateY(-60px);}
}
</style>
</head>

<body class="p-4">

<!-- HUD -->
<div class="mb-4">
  <div>💰 Coins: <span id="coins">0</span></div>
  <div>⚡ Energy: <span id="energy">100</span></div>
  <div>📈 Level: <span id="level">1</span></div>

  <div class="bar mt-1"><div id="xpBar" class="fill" style="width:10%"></div></div>
</div>

<!-- COIN -->
<div class="flex justify-center relative">
  <div class="coin" onclick="tap(event)">⚛</div>
</div>

<!-- UPGRADES -->
<div class="mt-6 space-y-2">
  <button onclick="upgradeTap()" class="w-full bg-yellow-600 p-2 rounded">Upgrade Tap</button>
  <button onclick="upgradeFactory()" class="w-full bg-yellow-700 p-2 rounded">Upgrade Factory</button>
</div>

<!-- TERMINAL -->
<div id="terminal" class="mt-6 h-32 overflow-auto text-xs border border-yellow-500 p-2"></div>

<script>
let data = {
  coins:0,
  energy:100,
  level:1,
  xp:0,
  tapPower:1,
  factory:0,
  admin:false
};

const ADMIN_KEY = btoa("ASLAN-SUPREME-143");

function tap(e){
  if(data.energy <= 0) return;

  let gain = data.tapPower;
  data.coins += gain;
  data.energy -= 1;

  gainXP(gain);
  fx(e, "+"+gain);
  save();
  update();
}

function gainXP(val){
  data.xp += val;
  if(data.xp > data.level*100){
    data.xp = 0;
    data.level++;
    log("LEVEL UP → " + data.level);
  }
}

function upgradeTap(){
  if(data.coins < 100) return;
  data.coins -= 100;
  data.tapPower++;
  log("Tap upgraded");
}

function upgradeFactory(){
  if(data.coins < 500) return;
  data.coins -= 500;
  data.factory++;
  log("Factory upgraded");
}

setInterval(()=>{
  data.energy = Math.min(100, data.energy + 1);
},500);

setInterval(()=>{
  let income = data.factory;
  data.coins += income;
  if(income>0) log("Factory +" + income);
  update();
},1000);

function fx(e,text){
  let el = document.createElement("div");
  el.innerText=text;
  el.className="tapFx";
  el.style.left=e.clientX+"px";
  el.style.top=e.clientY+"px";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function log(t){
  let term=document.getElementById("terminal");
  term.innerHTML += t + "<br>";
  term.scrollTop=term.scrollHeight;
}

function update(){
  coins.innerText = Math.floor(data.coins);
  energy.innerText = data.energy;
  level.innerText = data.level;
  xpBar.style.width = (data.xp/(data.level*100))*100 + "%";
}

function save(){
  localStorage.setItem("aslan_v2", JSON.stringify(data));
}

function load(){
  let d = localStorage.getItem("aslan_v2");
  if(d) data = JSON.parse(d);
}

document.addEventListener("keydown", (e)=>{
  if(e.key==="A"){
    let key = prompt("Enter admin key");
    if(btoa(key)===ADMIN_KEY){
      data.admin=true;
      data.coins+=1000000;
      log("ADMIN MODE ACTIVATED");
    }
  }
});

load();
update();
</script>

</body>
</html>
