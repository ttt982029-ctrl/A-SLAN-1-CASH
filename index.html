<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A-SLAN NETWORK | Founder Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-glow { box-shadow: 0 0 50px rgba(245, 158, 11, 0.3); }
        .page { display: none; height: 82vh; overflow-y: auto; padding-bottom: 100px; }
        .active-page { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-active { color: #f59e0b; border-top: 2px solid #f59e0b; }
    </style>
</head>
<body>

    <div id="authScreen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6 text-center">
        <div class="glass w-full max-w-sm p-8 rounded-[40px] border-amber-500/30 border">
            <h1 class="text-5xl font-black mb-2 text-amber-500 italic tracking-tighter">A-SLAN</h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em] mb-8 font-bold">Network Access</p>
            
            <div class="space-y-4">
                <input type="text" id="authName" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center outline-none focus:border-amber-500">
                <input type="password" id="authPass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center outline-none focus:border-amber-500">
                
                <div id="signupBox">
                    <button onclick="handleAuth('signup')" class="w-full bg-amber-500 text-black font-black p-4 rounded-2xl shadow-lg shadow-amber-500/20">START MINING</button>
                    <p class="text-[10px] mt-4 text-gray-400">Already a member? <span onclick="toggleAuth(true)" class="text-amber-500 cursor-pointer font-bold">Login</span></p>
                </div>
                
                <div id="loginBox" class="hidden">
                    <button onclick="handleAuth('login')" class="w-full bg-white text-black font-black p-4 rounded-2xl">LOGIN</button>
                    <p class="text-[10px] mt-4 text-gray-400">New here? <span onclick="toggleAuth(false)" class="text-amber-500 cursor-pointer font-bold">Sign Up</span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="p-4 flex justify-between items-center glass m-4 rounded-3xl">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-amber-500 flex items-center justify-center font-bold text-black shadow-lg">A</div>
                <div>
                    <p id="topName" class="text-[10px] text-gray-400 font-black uppercase tracking-tighter"></p>
                    <span id="rankBadge" class="text-[9px] bg-amber-500/20 text-amber-500 px-2 py-0.5 rounded-full font-black">MINER</span>
                </div>
            </div>
            <div class="text-right">
                <p id="balance" class="text-xl font-black text-amber-500 tracking-tighter">0.00 ASL</p>
            </div>
        </header>

        <main class="px-6">
            <div id="minePage" class="page active-page text-center pt-10">
                <button onclick="tap()" class="coin-btn relative outline-none transition-transform active:scale-90">
                    <div class="w-64 h-64 rounded-full bg-gradient-to-b from-amber-400 to-amber-800 p-2 gold-glow">
                        <div class="w-full h-full rounded-full bg-black flex items-center justify-center border-4 border-amber-600/20">
                            <span class="text-7xl">🦁</span>
                        </div>
                    </div>
                </button>
                <div class="mt-16 glass p-5 rounded-3xl">
                    <div class="flex justify-between text-[10px] mb-2 font-bold uppercase text-gray-500">
                        <span>Energy</span>
                        <span id="energyText">1000/1000</span>
                    </div>
                    <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden">
                        <div id="energyBar" class="h-full bg-amber-500 rounded-full w-full transition-all"></div>
                    </div>
                </div>
            </div>

            <div id="walletPage" class="page space-y-4 pt-4 text-center">
                <div class="glass p-8 rounded-[40px] border-b-4 border-amber-500/50">
                    <p class="text-[10px] text-gray-400 uppercase font-black mb-1 tracking-widest">Global Assets</p>
                    <h2 class="text-5xl font-black text-amber-500" id="walletBal">0.00</h2>
                </div>
                <button onclick="logout()" class="text-red-500 text-[10px] font-black uppercase tracking-widest opacity-50 mt-10">Sign Out</button>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full glass h-20 flex justify-around items-center rounded-t-[40px] border-t border-white/10 z-50">
            <button onclick="showPage('minePage', this)" class="flex flex-col items-center gap-1 nav-active transition-all">
                <i class="fa-solid fa-hammer text-xl"></i><span class="text-[9px] font-black uppercase">Mine</span>
            </button>
            <button onclick="showPage('walletPage', this)" class="flex flex-col items-center gap-1 text-gray-500 transition-all">
                <i class="fa-solid fa-wallet text-xl"></i><span class="text-[9px] font-black uppercase">Wallet</span>
            </button>
            <button onclick="adminAccess()" class="flex flex-col items-center gap-1 text-gray-500">
                <i class="fa-solid fa-crown text-xl"></i><span class="text-[9px] font-black uppercase">Admin</span>
            </button>
        </nav>
    </div>

    <script>
        // Force cleanup once to ensure you are the first
        if (!localStorage.getItem('aslan_v3_reset')) {
            localStorage.clear();
            localStorage.setItem('aslan_v3_reset', 'done');
            localStorage.setItem('aslan_claimed', 'false'); // Bonus status
        }

        let userData = { name: "", pass: "", balance: 0, energy: 1000 };

        window.onload = function() {
            const savedData = localStorage.getItem('aslan_user');
            if (savedData) {
                userData = JSON.parse(savedData);
                enterApp();
            }
        };

        function toggleAuth(isLogin) {
            document.getElementById('signupBox').style.display = isLogin ? 'none' : 'block';
            document.getElementById('loginBox').style.display = isLogin ? 'block' : 'none';
        }

        function handleAuth(type) {
            const name = document.getElementById('authName').value;
            const pass = document.getElementById('authPass').value;

            if (name.length < 3 || pass.length < 3) return alert("Username/Password too short!");

            if (type === 'signup') {
                // FOUNDER LOGIC: Only the first person ever gets the bonus
                let isClaimed = localStorage.getItem('aslan_claimed');
                let bonus = 0;

                if (isClaimed === 'false') {
                    bonus = 1000000;
                    localStorage.setItem('aslan_claimed', 'true');
                    alert("FOUNDER REWARD: 1,000,000 ASL Claimed!");
                } else {
                    bonus = 0;
                }

                userData = { name, pass, balance: bonus, energy: 1000 };
                saveData();
                enterApp();
            } else {
                const saved = JSON.parse(localStorage.getItem('aslan_user'));
                if (saved && saved.name === name && saved.pass === pass) {
                    userData = saved;
                    enterApp();
                } else {
                    alert("Wrong Credentials!");
                }
            }
        }

        function enterApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('topName').innerText = userData.name;
            if(userData.balance >= 1000000) document.getElementById('rankBadge').innerText = "FOUNDER";
            updateUI();
        }

        function tap() {
            if (userData.energy <= 0) return;
            userData.balance += 0.01;
            userData.energy -= 1;
            updateUI();
            saveData();
        }

        function adminAccess() {
            let key = prompt("Master Access Key:");
            if (key === "Aslan Admin") {
                userData.balance += 5000000;
                userData.name = "DR. HELP (MASTER)";
                saveData();
                location.reload(); 
            }
        }

        function saveData() {
            localStorage.setItem('aslan_user', JSON.stringify(userData));
        }

        function logout() {
            if(confirm("Logout?")) {
                localStorage.removeItem('aslan_user');
                location.reload();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = userData.balance.toLocaleString(undefined, {minimumFractionDigits: 2}) + " ASL";
            document.getElementById('walletBal').innerText = userData.balance.toLocaleString();
            document.getElementById('energyBar').style.width = (userData.energy / 10) + "%";
            document.getElementById('energyText').innerText = userData.energy + "/1000";
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('nav button').forEach(b => { b.classList.add('text-gray-500'); b.classList.remove('nav-active'); });
            document.getElementById(id).classList.add('active-page');
            btn.classList.add('nav-active'); btn.classList.remove('text-gray-500');
        }

        setInterval(() => { if (userData.energy < 1000) { userData.energy += 5; updateUI(); saveData(); } }, 4000);
    </script>
</body>
</html>
