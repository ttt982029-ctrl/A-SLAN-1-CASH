<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #fff; }
        .input-glow:focus { box-shadow: 0 0 10px rgba(243, 186, 47, 0.5); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="loginScreen" class="w-full max-w-sm bg-[#121212] p-8 rounded-3xl border border-gray-800 shadow-2xl">
        <h1 class="text-2xl font-bold gold text-yellow-500 mb-2 text-center">ASLAN-X LOGIN</h1>
        <p class="text-gray-500 text-xs text-center mb-8">Enter your credentials to access the platform</p>
        
        <input id="passInput" type="password" placeholder="Enter Password (e.g. 143143)" 
               class="input-glow w-full p-4 bg-[#0a0a0a] border border-gray-700 rounded-2xl text-white mb-6 outline-none transition-all">
        
        <button id="loginBtn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-4 rounded-2xl transition-all active:scale-95 mb-6">
            LOGIN
        </button>

        <div class="p-4 bg-red-900/10 border border-red-900/30 rounded-xl">
            <p class="text-red-500 text-[10px] font-bold uppercase tracking-widest text-center">
                ⚠️ Warning: Risk Involved
            </p>
            <p class="text-gray-400 text-[9px] mt-2 text-center leading-relaxed">
                Trading involves significant risk of loss. Only trade with money you can afford to lose. Use of this platform is at your own discretion.
            </p>
        </div>
    </div>

    <div id="app" class="hidden">
        </div>

    <script>
        document.getElementById("loginBtn").onclick = () => {
            const pass = document.getElementById("passInput").value;
            if(pass === "143143") {
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("app").classList.remove("hidden");
                alert("Welcome, Admin!");
            } else {
                alert("Invalid Credentials!");
            }
        };
    </script>
</body>
</html>
