<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASLAN-X | THE FINAL PROTOCOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --gold: #ffcc00; --neon-green: #00ff41; --bg-black: #020202; }
        body { background: var(--bg-black); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; user-select: none; }

        /* THE ILLUMINATI 3D GOLD COIN */
        .coin-3d {
            width: 260px; height: 260px;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b, #000);
            border-radius: 50%; border: 4px solid #fff;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.2), inset 0 0 40px #000;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.05s; transform-style: preserve-3d; cursor: pointer;
        }
        .coin-3d:active { transform: scale(0.9) rotateY(15deg); }
        .illuminati-img { width: 160px; filter: drop-shadow(0 0 15px #000); pointer-events: none; }

        /* BITCOIN MINING SIMULATOR */
        .mining-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
            font-size: 8px; color: var(--neon-green); opacity: 0.4; overflow: hidden; height: 120px;
        }

        /* PREMIUM UI ELEMENTS */
        .glass-panel { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 204, 0, 0.1); border-radius: 20px; }
        .tab-content { display: none; height: 100%; animation: fadeIn 0.4s ease; }
        .tab-active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* REWARD POPUP */
        .reward-fx { position: absolute; font-family: 'Orbitron'; font-weight: 900; color: var(--gold); pointer-events: none; animation: fly 0.8s ease-out forwards; z-index: 1000; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-140px); } }

        #boot-loader { position: fixed; inset: 0; background: black; z-index: 9999; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="boot-loader">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-[10px] tracking-[0.5em] text-yellow-500 uppercase">Injecting Admin Privileges...</p>
        </div>
    </div>

    <div id="login-screen" class="fixed inset-0 z-[5000] bg-black flex flex-col items-center justify-center p-10">
        <h1 class="text-4xl font-black tracking-[0.3em] text-yellow-500 font-orbitron mb-12">ASLAN-X</h1>
        <div class="w-full max-w-xs space-y-4">
            <input type="text" id="master-id" placeholder="IDENTITY ACCESS KEY" class="w-full bg-neutral-900 border border-neutral-800 p-4 rounded-xl outline-none text-center font-bold tracking-widest text-sm focus:border-yellow-600 transition-all">
            <button onclick="handleAuth()" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-400 text-black font-black py-4 rounded-xl shadow-2xl active:scale-95 transition-all uppercase tracking-widest">Connect to Node</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex-grow flex flex-col h-full relative">
        
        <div class="p-6 flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 glass-panel flex items-center justify-center border-yellow-600/30">
                    <i class="fas fa-shield-halved text-yellow-500"></i>
                </div>
                <div>
                    <p id="role-tag" class="text-[8px] text-gray-500 font-bold uppercase tracking-[0.3em]">SECURE LINK</p>
                    <p id="user-name" class="text-xs font-black tracking-widest">@USER</p>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[8px] text-yellow-600 font-bold bg-yellow-600/10 px-2 py-1 rounded">V4.0 ELITE</span>
            </div>
        </div>

        <div class="text-center py-2 z-10">
            <p class="text-[10px] text-neutral-500 font-bold uppercase tracking-[0.4em] mb-1">Decentralized Assets</p>
            <h1 id="total-bal" class="text-6xl font-black font-orbitron tracking-tighter text-yellow-500 drop-shadow-[0_0_15px_rgba(255,204,0,0.2)]">0</h1>
        </div>

        <div class="flex-grow overflow-hidden relative z-10 px-6 py-4">
            
            <div id="tab-mining" class="tab-content tab-active items-center justify-center">
                <div class="mining-grid mb-6 w-full opacity-20" id="mining-stats"></div>
                
                <div class="relative">
                    <div id="main-coin" class="coin-3d">
                        <img src="https://img.icons8.com/color/512/000000/illuminati.png" class="illuminati-img">
                    </div>
                </div>

                <div class="mt-8 glass-panel p-4 w-full flex justify-between items-center border-green-500/20">
                    <div class="flex flex-col">
                        <span class="text-[8px] text-gray-500 uppercase tracking-widest">Mining Speed</span>
                        <span id="speed-text" class="text-xs text-green-500 font-bold tracking-widest">0.00 TH/s</span>
                    </div>
                    <div class="text-right">
                        <span class="text-[8px] text-gray-500 uppercase tracking-widest">Tap Goal</span>
                        <span id="tap-goal" class="text-xs text-yellow-500 font-bold block">0 / 10</span>
                    </div>
                </div>
            </div>

            <div id="tab-rank" class="tab-content flex-col gap-3">
                <h2 class="font-orbitron text-center text-yellow-500 tracking-widest mb-6">Hierarchy</h2>
                <div class="glass-panel p-5 flex justify-between items-center border-yellow-500 shadow-[0_0_20px_rgba(255,204,0,0.1)]">
                    <span class="font-bold text-sm">#1 MASTER (@ASLAN)</span>
                    <span id="rank-val" class="font-orbitron text-yellow-500">0</span>
                </div>
                <div class="glass-panel p-4 flex justify-between items-center opacity-30">
                    <span class="text-xs">#2 Satoshi_Shadow</span>
                    <span class="text-xs font-mono">948,000</span>
                </div>
            </div>

            <div id="tab-wallet" class="tab-content justify-center">
                <div class="glass-panel p-8 space-y-6">
                    <h3 class="text-center text-yellow-600 font-bold text-xs tracking-[0.3em] uppercase">Transfer Protocol</h3>
                    <input type="text" placeholder="RECIPIENT HASH" class="w-full bg-black/50 border border-white/5 p-4 rounded-xl outline-none text-xs focus:border-yellow-600">
                    <input type="number" placeholder="AMOUNT" class="w-full bg-black/50 border border-white/5 p-4 rounded-xl outline-none text-xs focus:border-yellow-600">
                    <button class="w-full bg-yellow-600 text-black font-black py-4 rounded-xl shadow-lg">INITIALIZE P2P</button>
                </div>
            </div>

        </div>

        <div class="p-8">
            <div class="glass-panel flex justify-around items-center py-4 bg-black/60">
                <button onclick="nav('mining')" id="n-mining" class="flex flex-col items-center gap-1 text-yellow-500">
                    <i class="fas fa-server text-xl"></i><span class="text-[8px] font-bold">NODE</span>
                </button>
                <button onclick="nav('rank')" id="n-rank" class="flex flex-col items-center gap-1 text-gray-500">
                    <i class="fas fa-crown text-xl"></i><span class="text-[8px] font-bold">RANK</span>
                </button>
                <button onclick="nav('wallet')" id="n-wallet" class="flex flex-col items-center gap-1 text-gray-500">
                    <i class="fas fa-wallet text-xl"></i><span class="text-[8px] font-bold">WALLET</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('aslan_ultimate_bal')) || 0;
        let taps = 0;
        let isAdmin = false;

        function handleAuth() {
            const id = document.getElementById('master-id').value;
            if(!id) return alert("System Requires ID");

            if(id.toUpperCase().includes('ADMIN') || id.toUpperCase().includes('ASLAN')) {
                isAdmin = true;
                if(!localStorage.getItem('aslan_v4_secured')) {
                    balance = 1000000;
                    localStorage.setItem('aslan_v4_secured', 'true');
                }
            }

            document.getElementById('boot-loader').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-name').innerText = `@${id.toUpperCase()}`;
                document.getElementById('role-tag').innerText = isAdmin ? "Supreme Controller" : "Worker Node";
                update();
                startMiningEffect();
                document.getElementById('boot-loader').style.display = 'none';
            }, 1500);
        }

        function update() {
            document.getElementById('total-bal').innerText = balance.toLocaleString();
            document.getElementById('rank-val').innerText = balance.toLocaleString();
            document.getElementById('speed-text').innerText = isAdmin ? "999.99 TH/s" : "0.01 TH/s";
            
            if(!isAdmin) {
                document.getElementById('tap-goal').innerText = `${taps} / 10`;
            } else {
                document.getElementById('tap-goal').innerText = "Admin: Max Multiplier";
            }
            localStorage.setItem('aslan_ultimate_bal', balance);
        }

        document.getElementById('main-coin').addEventListener('touchstart', (e) => {
            e.preventDefault();
            let reward = 0;
            let canGet = false;

            if (isAdmin) {
                reward = 10000; // 10k per tap
                canGet = true;
            } else {
                taps++;
                if (taps >= 10) {
                    reward = 1; // 10 taps = 1 coin
                    taps = 0;
                    canGet = true;
                }
            }

            if (canGet) {
                balance += reward;
                const t = e.touches[0];
                const fx = document.createElement('div');
                fx.className = 'reward-fx text-xl';
                fx.innerText = `+$${reward}`;
                fx.style.left = `${t.clientX}px`; fx.style.top = `${t.clientY}px`;
                document.body.appendChild(fx);
                setTimeout(() => fx.remove(), 800);
            }
            update();
        });

        function nav(p) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('tab-active'));
            document.getElementById('tab-' + p).classList.add('tab-active');
            document.querySelectorAll('button[id^="n-"]').forEach(b => b.classList.replace('text-yellow-500', 'text-gray-500'));
            document.getElementById('n-' + p).classList.replace('text-gray-500', 'text-yellow-500');
        }

        function startMiningEffect() {
            const stats = document.getElementById('mining-stats');
            setInterval(() => {
                const code = Math.random().toString(16).substring(2, 10).toUpperCase();
                const div = document.createElement('div');
                div.innerText = `0x${code}`;
                stats.prepend(div);
                if(stats.children.length > 40) stats.lastChild.remove();
                if(isAdmin) balance += 500; // Passive income for admin
                update();
            }, 1000);
        }

        update();
    </script>
</body>
</html>
