<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASLAN-X PRO | Tiranga x Kitto x Groww</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        .gold { color: #f3ba2f; }
        
        /* 1. Tiranga Style Input Glow */
        .input-glow:focus { box-shadow: 0 0 15px rgba(243, 186, 47, 0.4); border-color: #f3ba2f; }

        /* 2. Kitto Style Character & Animation */
        .character-box { perspective: 1000px; }
        .character {
            width: 200px; height: 200px;
            background: url('https://img.icons8.com/plasticine/200/kitty.png') no-repeat center; /* क्यूट किट्टो कैरेक्टर */
            background-size: contain;
            cursor: pointer;
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 0 20px rgba(243, 186, 47, 0.2));
        }
        .character:active { transform: scale(0.9) rotate(-5deg); }

        /* Floating +10 Animation */
        .plus-one {
            position: absolute; color: #f3ba2f; font-weight: bold; font-size: 20px;
            animation: floatUp 1s ease-out forwards; pointer-events: none; z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }

        /* 3. Groww Style Glass Bottom Sheet */
        .groww-sheet {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-radius: 40px 40px 0 0;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center">

    <div id="loginScreen" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-8 transition-opacity duration-500">
        <div class="w-full max-w-sm bg-[#111] p-10 rounded-3xl border border-gray-800 shadow-2xl text-center">
            <h1 class="text-3xl font-black gold mb-3 tracking-tighter">ASLAN-X PRO</h1>
            <p class="text-gray-500 text-sm mb-10">Tiranga Gaming Alliance</p>
            
            <input id="passInput" type="password" placeholder="🔑 Enter Agent Password" 
                   class="input-glow w-full p-5 bg-[#0a0a0a] border border-gray-800 rounded-2xl text-white mb-6 outline-none text-center text-lg">
            
            <button id="loginBtn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-5 rounded-2xl transition-all active:scale-95 mb-8 text-lg">
                ACCESS SYSTEM
            </button>

            <div class="p-4 bg-red-950/20 border border-red-900/40 rounded-xl text-left">
                <p class="text-red-500 text-xs font-bold uppercase text-center">⚠️ Trading Risk Notice</p>
                <p class="text-gray-400 text-[10px] mt-2 leading-relaxed text-center">
                    All forms of trading involve risk. Past performance is not indicative of future results. Only use funds you can afford to lose.
                </p>
            </div>
        </div>
    </div>

    <div id="app" class="hidden h-screen w-full flex flex-col transition-opacity duration-500 pb-[180px]">
        <div class="w-full p-6 flex justify-between items-center z-10">
            <div class="bg-gray-900/50 p-3 rounded-xl border border-gray-800">
                <p class="text-[10px] text-gray-400 uppercase">Rank</p>
                <h2 id="rank" class="font-bold gold text-sm">BRONZE AGENT</h2>
            </div>
            <div class="bg-gray-900/50 p-3 rounded-xl border border-gray-800 text-right">
                <p class="text-[10px] text-gray-400 uppercase">VIP Level</p>
                <h2 id="vip" class="font-bold text-blue-400 text-sm">LVL 1</h2>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative">
            <h1 class="text-xs gold tracking-[0.4em] uppercase opacity-60">Total Earnings</h1>
            <h1 id="bal" class="text-7xl font-extrabold mt-3 text-white tracking-tight">0</h1>
            
            <div class="character-box mt-12 relative">
                <div id="character" class="character"></div>
                </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 groww-sheet p-6 z-20">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-lg font-semibold text-white">Trade & Withdraw</h2>
                <span class="text-gold text-xs font-bold bg-gold/10 px-3 py-1 rounded-full border border-gold/20">AGENT PORTAL</span>
            </div>
            
            <div class="flex gap-4">
                <button class="flex-1 bg-white hover:bg-gray-200 text-black py-4 rounded-2xl font-bold active:scale-95 transition-all text-md shadow-lg">
                    BUY ASSETS
                </button>
                <button class="flex-1 bg-[#1a1a1a] border border-gray-800 hover:bg-gray-800 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all text-md">
                    SELL
                </button>
            </div>
            
            <button id="logoutBtn" class="w-full text-center text-xs text-red-600 mt-5 opacity-60 hover:opacity-100">End Session (Logout)</button>
        </div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem("aslan_bal")) || 0;
        const balEl = document.getElementById("bal");
        const charEl = document.getElementById("character");
        
        // --- 1. Tiranga Login Logic ---
        document.getElementById("loginBtn").onclick = () => {
            const pass = document.getElementById("passInput").value;
            if(pass === "143143") {
                balance = 1000000; // 1 Million for Admin
                document.getElementById("loginScreen").style.opacity = '0';
                setTimeout(() => {
                    document.getElementById("loginScreen").classList.add("hidden");
                    document.getElementById("app").classList.remove("hidden");
                    updateUI();
                }, 500);
            } else {
                alert("❌ ACCESS DENIED: Invalid Agent Key");
            }
        };

        // --- 2. Kitto Game Logic & Animations ---
        charEl.onclick = (e) => {
            balance += 10;
            updateUI();
            
            // Create Floating +10
            const plus = document.createElement("div");
            plus.className = "plus-one";
            plus.innerText = "+10";
            
            // Position near the click (relative to character box)
            const rect = charEl.getBoundingClientRect();
            plus.style.left = (e.clientX - rect.left - 20) + "px";
            plus.style.top = (e.clientY - rect.top - 20) + "px";
            
            charEl.parentElement.appendChild(plus);
            
            // Remove after animation
            setTimeout(() => plus.remove(), 1000);
        };

        // --- 3. UI Update & Rank/VIP Logic ---
        function updateUI() {
            balEl.innerText = balance.toLocaleString();
            localStorage.setItem("aslan_bal", balance);

            // Rank & VIP auto-update
            let rank = "BRONZE AGENT";
            let vipLvl = Math.floor(balance / 100000) + 1;
            
            if(balance > 10000000) rank = "DIAMOND AGENT";
            else if(balance > 5000000) rank = "PLATINUM AGENT";
            else if(balance > 1000000) rank = "GOLD AGENT";
            else if(balance > 100000) rank = "SILVER AGENT";

            document.getElementById("rank").innerText = rank;
            document.getElementById("vip").innerText = "LVL " + vipLvl;
        }

        // --- 4. Groww Logout Logic ---
        document.getElementById("logoutBtn").onclick = () => {
            location.reload(); // Simple reload to go back to login
        };

        // Init if already logged in (for testing)
        // If you want persistence, use sessionStorage for login state.
    </script>
</body>
</html>
